<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - LDI Copilot</title>
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b24;
    --border: #2a313f;
    --text: #e6e9ef;
    --muted: #8b94a7;
    --accent: #4da3ff;
    --error: #ff8a4c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .card {
    width: 340px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p.sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input {
    width: 100%;
    padding: 9px 10px;
    margin-bottom: 14px;
    background: #10141c;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #08101f;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: default; }
  .error { color: var(--error); font-size: 13px; margin: 0 0 14px; min-height: 16px; }
  .btn-ms {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 10px;
    background: #2f2f2f;
    border: 1px solid #555;
    border-radius: 6px;
    color: #fff;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
  }
  .btn-ms:hover { background: #3a3a3a; }
  .ms-logo { width: 18px; height: 18px; flex: none; }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  #localForm.hidden, #entraBtnWrap.hidden, .divider.hidden { display: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔒 LDI Copilot</h1>
    <p class="sub">Sign in to continue.</p>
    <div class="error" id="err"></div>

    <div id="entraBtnWrap" class="hidden">
      <a id="btnEntra" class="btn-ms" href="/api/auth/entra/login">
        <svg class="ms-logo" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </a>
    </div>
    <div class="divider" id="divider">or</div>

    <form id="loginForm" autocomplete="on">
      <label for="u">Username</label>
      <input id="u" name="username" autocomplete="username" required autofocus>
      <label for="p">Password</label>
      <input id="p" name="password" type="password" autocomplete="current-password" required>
      <button id="btn" type="submit">Sign in</button>
    </form>
  </div>
  <script>
    const err = document.getElementById("err");

    // Surface a Microsoft Entra ID sign-in FAILURE, if we just landed
    // back here via a redirect from /api/auth/entra/callback (see
    // backend/app.py's entra_callback() - a browser navigation can't
    // return JSON a script would read the way the local-login POST
    // below can, so the error comes back as a query param instead).
    const params = new URLSearchParams(window.location.search);
    if (params.get("error")) {
      err.textContent = params.get("error");
      // Clean the URL so refreshing/bookmarking doesn't keep re-showing
      // a stale error message.
      window.history.replaceState({}, "", window.location.pathname);
    }

    // Decide which sign-in option(s) this instance actually offers -
    // Entra ID SSO, local accounts, or both (see backend/app.py's
    // GET /api/auth/entra/enabled). Hides whichever option isn't
    // actually usable rather than showing a form/button that could
    // never succeed.
    fetch("/api/auth/entra/enabled").then((r) => r.json()).then((data) => {
      if (data.entra_enabled) {
        document.getElementById("entraBtnWrap").classList.remove("hidden");
      }
      if (data.entra_enabled && !data.accounts_configured) {
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("divider").classList.add("hidden");
      }
    }).catch(() => {
      // Network error - leave the default (local form visible, Entra
      // button hidden) rather than guessing.
    });

    const form = document.getElementById("loginForm");
    const btn = document.getElementById("btn");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "Signing in…";
      try {
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("u").value,
            password: document.getElementById("p").value,
          }),
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.detail || `Sign in failed (HTTP ${resp.status}).`);
        }
        window.location.href = "/";
      } catch (ex) {
        err.textContent = ex.message;
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
