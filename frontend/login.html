<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - LDI Copilot</title>
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b24;
    --border: #2a313f;
    --text: #e6e9ef;
    --muted: #8b94a7;
    --accent: #4da3ff;
    --error: #ff8a4c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .card {
    width: 340px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p.sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input {
    width: 100%;
    padding: 9px 10px;
    margin-bottom: 14px;
    background: #10141c;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #08101f;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: default; }
  .error { color: var(--error); font-size: 13px; margin: 0 0 14px; min-height: 16px; }
</style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <h1>🔒 LDI Copilot</h1>
    <p class="sub">Sign in with your team account.</p>
    <div class="error" id="err"></div>
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" required autofocus>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <button id="btn" type="submit">Sign in</button>
  </form>
  <script>
    const form = document.getElementById("loginForm");
    const err = document.getElementById("err");
    const btn = document.getElementById("btn");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "Signing in…";
      try {
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("u").value,
            password: document.getElementById("p").value,
          }),
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.detail || `Sign in failed (HTTP ${resp.status}).`);
        }
        window.location.href = "/";
      } catch (ex) {
        err.textContent = ex.message;
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
